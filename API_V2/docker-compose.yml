services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: genz_v2
      POSTGRES_USER: genz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genz -d genz_v2"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build: .
    environment: &app-environment
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://genz:${POSTGRES_PASSWORD}@postgres:5432/genz_v2
      REDIS_URL: redis://redis:6379/0
      API_KEY_PEPPER: ${API_KEY_PEPPER:?API_KEY_PEPPER is required}
      SYNTHETIC_ID_SECRET: ${SYNTHETIC_ID_SECRET:?SYNTHETIC_ID_SECRET is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-["https://explorer.databolico.com"]}
      RAW_STORAGE_PATH: /data/raw
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-2}
    volumes:
      - raw_data:/data/raw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v2/health/live')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  worker:
    build: .
    command: ["worker"]
    environment: *app-environment
    volumes:
      - raw_data:/data/raw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  raw_data:
