name: API V2 CI

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: genz_v2
          POSTGRES_USER: genz
          POSTGRES_PASSWORD: ci-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U genz -d genz_v2"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20

    env:
      ENVIRONMENT: test
      API_KEY_PEPPER: ci-pepper-not-used-in-production
      SYNTHETIC_ID_SECRET: ci-id-secret-not-used-in-production

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt pip-audit
      - run: ruff check app scripts tests alembic
      - run: ruff format --check app scripts tests alembic
      - run: pytest --cov=app --cov-report=term-missing
      - run: pip-audit -r requirements.txt
      - name: Migration and dependency integration
        env:
          DATABASE_URL: postgresql+psycopg://genz:ci-password@localhost:5432/genz_v2
          REDIS_URL: redis://localhost:6379/0
        run: |
          alembic upgrade head
          python -m scripts.integration_check
          alembic downgrade base
          alembic upgrade head

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
